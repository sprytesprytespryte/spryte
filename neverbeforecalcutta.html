<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Hole of Kolkata – Spryte Texts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="images/spryte%20flower%20favicon.png?v=3" sizes="any" type="image/png">
  <link rel="shortcut icon" href="images/spryte%20flower%20favicon.png?v=3" type="image/png">
  <link rel="apple-touch-icon" href="images/spryte%20flower%20favicon.png?v=3">
  <style>
    body { margin:0; background:#000; color:#fff; font-family:'Inter', Arial, sans-serif; line-height:1.45; }
    header { padding:0; text-align:center; }
    h1 { margin:0 0 1rem; font-size:2rem; letter-spacing:0.5px; color:#fff; }
    h2 { margin:1.8rem 0 0.6rem; font-size:0.95rem; letter-spacing:1px; text-transform:uppercase; color:#fff; }
    main { width:70vw; margin:0 0 4rem 0; padding:0 1.25rem; }
    @media (max-width: 900px){ main { width:100%; } }
    p { margin:0 0 1.1rem; }
    a { color:#fff; }
    a:hover { text-decoration:underline; }
    .back { display:inline-block; margin-top:2rem; font-size:0.85rem; text-decoration:none; border:1px solid currentColor; padding:0.4rem 0.7rem; }
    .back:hover { background:rgba(255,255,255,0.1); }
    @keyframes hue { 0% { filter:hue-rotate(0deg);} 100% { filter:hue-rotate(360deg);} }
    @media (prefers-reduced-motion: reduce) { h1, h2 { animation:none; } }
    .logo {
      position:absolute;
      top:50%;
      left:50%;
      transform: translate(-50%, -50%);
      max-height:80%;
      max-width:95%;
      height:auto;
      width:auto;
      object-fit:contain;
    }
  </style>
</head>
<body>
  <header style="position:relative; height:6rem; border-bottom:2px solid #fff; overflow:hidden; display:flex; align-items:center; justify-content:center;">
    <a href="index.html" aria-label="Return to Spryte homepage" style="display:block; width:100%; height:100%;">
      <img class="logo" src="images/spryte_logo.png" alt="Spryte Logo (Back to Home)" style="animation:hue 20s linear infinite; border:none;" />
    </a>
  </header>

  <section style="width:70vw; margin:1.5rem 0 0; padding:0 1.25rem;">
    <h1 style="margin:0 0 0.25rem; font-size:1.15rem; text-transform:uppercase;">Black Hole of Kolkata</h1>
    <p style="margin:0 0 0.2rem; font-style:italic; font-size:0.9rem;">Rashi Rajguru</p>
    <p style="margin:0 0 1.5rem; font-size:0.8rem; opacity:0.7;"></p>
  </section>

  <main style="width:70vw; margin:0 0 4rem; padding:0 1.25rem;">
  </main>
</body>
</html>
