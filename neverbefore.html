<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rashi Rajguru: Never Before - 1/8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Play:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --panel: #000000;
      --ink: #f1fff1;
      --muted: #8ddf8d;
      --accent: #00ff66;
      --accent-soft: #00aa44;
      --card-radius: 0px;
      --shadow: 0 0 28px rgba(0, 255, 102, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background: var(--bg);
      font-family: "Inter", Arial, sans-serif;
      font-size: 0.875rem;
    }

    @keyframes textHue {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .brand {
      position: relative;
      height: 6rem;
      border-bottom: 2px solid var(--accent);
      overflow: hidden;
      margin-bottom: 1.2rem;
    }

    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-height: 62%;
      max-width: 72%;
      height: auto;
      width: auto;
      object-fit: contain;
      animation: textHue 20s linear infinite;
    }

    .page {
      width: min(1120px, 100% - 2rem);
      margin: 0 auto 2rem;
      display: grid;
      gap: 1rem;
    }

    .carousel {
      position: relative;
      border-radius: 0;
      border: none;
      background: transparent;
      backdrop-filter: blur(4px);
      padding: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .viewport {
      overflow: hidden;
      border-radius: 0;
      touch-action: pan-y;
      cursor: grab;
    }

    .viewport.dragging {
      cursor: grabbing;
    }

    .track {
      display: flex;
      will-change: transform;
      transition: transform 360ms cubic-bezier(0.2, 0.7, 0.15, 1);
    }

    .track.no-anim {
      transition: none;
    }

    .card {
      min-width: 100%;
      background: var(--panel);
      border-radius: var(--card-radius);
      border: none;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr;
      max-height: min(74vh, 780px);
    }

    .card-inner {
      overflow: auto;
      padding: clamp(1rem, 1.4vw + 0.8rem, 2rem);
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }

    .card-inner::-webkit-scrollbar {
      width: 10px;
    }

    .card-inner::-webkit-scrollbar-thumb {
      background: var(--accent-soft);
      border-radius: 999px;
    }

    .image-card figure,
    .essay-card figure {
      margin: 0;
      display: grid;
      gap: 0.75rem;
    }

    .image-card img,
    .essay-card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0;
      border: none;
    }

    figcaption {
      color: var(--muted);
      font-family: "Inter", "Trebuchet MS", sans-serif;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .essay-card h2 {
      margin: 0 0 0.8rem;
      font-size: 0.875rem;
      line-height: 1.1;
      font-family: "Inter", Arial, sans-serif;
      letter-spacing: 0.02em;
      animation: textHue 20s linear infinite;
    }

    .essay-card p {
      margin: 0 0 1rem;
      font-family: "Inter", "Trebuchet MS", sans-serif;
      line-height: 1.65;
      font-size: 0.875rem;
      max-width: 72ch;
      text-indent: 0;
      padding-left: 1.1em;
    }

    .essay-card .inline-media {
      margin: 1.2rem 0;
    }

    .carousel-body {
      position: relative;
      padding: 0 2rem;
    }

    #prevBtn {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }

    #nextBtn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }

    button {
      border: none;
      background: transparent;
      color: var(--accent);
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-weight: 400;
      font-size: 0.875rem;
      line-height: 1;
      opacity: 0.2;
      transition: opacity 180ms ease, text-shadow 180ms ease;
    }

    button:hover {
      opacity: 1;
      text-shadow: 0 0 9px rgba(0, 255, 102, 0.45);
    }

    button:focus-visible {
      opacity: 1;
      outline: 1px solid rgba(0, 255, 102, 0.65);
      outline-offset: 2px;
      text-shadow: 0 0 9px rgba(0, 255, 102, 0.45);
    }

    .carousel-body:hover #prevBtn,
    .carousel-body:hover #nextBtn {
      opacity: 1;
    }

    button:disabled {
      opacity: 0.08;
      text-shadow: none;
      cursor: default;
    }

    .dots {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0 0.35rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border: none;
      border-radius: 999px;
      background: rgba(0, 255, 102, 0.3);
      padding: 0;
    }

    .dot[aria-current="true"] {
      width: 12px;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0, 255, 102, 0.35);
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 1rem, 700px);
      }

      .card {
        max-height: min(80vh, 760px);
      }

      .nav {
        grid-template-columns: 1fr auto 1fr;
      }

      button {
        opacity: 1;
      }
    }

    @media (min-width: 761px) {
      #prevBtn,
      #nextBtn {
        font-size: 1.7rem;
        padding: 0.4rem 0.75rem 0.52rem;
        border: 1px solid rgba(0, 255, 102, 0.55);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .carousel-body {
        padding: 0 3.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="brand">
    <a href="index.html" aria-label="Return to Spryte homepage" style="display:block; width:100%; height:100%;">
      <img class="logo" src="images/spryte flower favicon.png" alt="Spryte Logo" />
    </a>
  </header>

</body>
</html>
